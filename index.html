<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Perfect Script · Content Cartel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F6F4EF; --surface: #fff; --s2: #FAFAF7;
    --gold: #B08D5A; --goldBg: #F4EDE0; --goldDark: #8B6D3F;
    --char: #1A1714; --text: #2D2A26; --muted: #9A8F85;
    --border: #E6E1D8; --borderL: #F0EDE8;
    --red: #B34040; --green: #3A7A60; --greenBg: #EAF4EE;
  }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
  input, textarea, button, select { font-family: 'DM Sans', sans-serif; }
  input, textarea {
    width: 100%; padding: 11px 15px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; line-height: 1.7; }
  a { color: var(--gold); text-decoration: none; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .page { animation: fadeUp 0.35s ease forwards; }
  @keyframes slideIn { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
  .panel { animation: slideIn 0.28s ease forwards; }
  .row-hover:hover { background: var(--s2) !important; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const T = {
  bg:"#F6F4EF", surface:"#fff", s2:"#FAFAF7",
  gold:"#B08D5A", goldBg:"#F4EDE0", goldDark:"#8B6D3F",
  char:"#1A1714", text:"#2D2A26", muted:"#9A8F85",
  border:"#E6E1D8", borderL:"#F0EDE8",
  red:"#B34040", green:"#3A7A60", greenBg:"#EAF4EE",
};

const CONFIG = {
  supabaseUrl: "https://hjbhjbqfgfshclpbyvbc.supabase.co",
  supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqYmhqYnFmZ2ZzaGNscGJ5dmJjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDc5NTM4MywiZXhwIjoyMDkwMzcxMzgzfQ.HoLO5W8Ae_AGHY2yzCmJSFVZ28VeHKuoQ9n3r04kfEw",
  webhookUrl:  "https://content-cartel-1.app.n8n.cloud/webhook/generate-script",
};

function sb(url, key) {
  const h = { apikey:key, Authorization:`Bearer ${key}`, "Content-Type":"application/json", Prefer:"return=representation" };
  const base = `${url}/rest/v1`;
  return {
    get:   (t, q="")  => fetch(`${base}/${t}${q}`, { headers:h }).then(r => r.json()),
    post:  (t, d)     => fetch(`${base}/${t}`, { method:"POST", headers:h, body:JSON.stringify(d) }).then(r => r.json()),
    patch: (t, id, d) => fetch(`${base}/${t}?id=eq.${id}`, { method:"PATCH", headers:h, body:JSON.stringify(d) }).then(r => r.json()),
    del:   (t, id)    => fetch(`${base}/${t}?id=eq.${id}`, { method:"DELETE", headers:h }),
  };
}

// ── SHARED ────────────────────────────────────────────────────
function Btn({ children, variant="primary", onClick, disabled, full, style={} }) {
  const base = { display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, padding:"11px 24px", borderRadius:8, fontSize:14, fontWeight:500, cursor:disabled?"not-allowed":"pointer", border:"none", transition:"all 0.15s", width:full?"100%":undefined, letterSpacing:"0.01em", ...style };
  const v = {
    primary: { background:T.char, color:"#fff", opacity:disabled?0.4:1 },
    gold:    { background:T.gold, color:"#fff", opacity:disabled?0.4:1 },
    ghost:   { background:"transparent", color:T.text, border:`1px solid ${T.border}` },
    danger:  { background:T.red, color:"#fff" },
    link:    { background:"none", color:T.gold, padding:0, fontWeight:500, fontSize:13 },
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...v[variant]}}>{children}</button>;
}

const IS = { width:"100%", padding:"11px 15px", border:`1px solid ${T.border}`, borderRadius:8, fontSize:14, color:T.text, background:T.surface, outline:"none", boxSizing:"border-box" };

function Field({ label, hint, children, mb=20 }) {
  return (
    <div style={{ marginBottom:mb }}>
      {label && <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
        <label style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase" }}>{label}</label>
        {hint && <span style={{ fontSize:11, color:T.muted }}>{hint}</span>}
      </div>}
      {children}
    </div>
  );
}

function Input({ label, hint, value, onChange, type="text", placeholder, readOnly, mb }) {
  return <Field label={label} hint={hint} mb={mb}>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly}
      style={{...IS, background:readOnly?T.bg:T.surface, color:readOnly?T.muted:T.text}} />
  </Field>;
}

function TextArea({ label, hint, value, onChange, placeholder, rows=4, mb }) {
  return <Field label={label} hint={hint} mb={mb}>
    <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{...IS, lineHeight:1.7, resize:"vertical"}} />
  </Field>;
}

function SectionDivider({ label }) {
  return <div style={{ display:"flex", alignItems:"center", gap:14, margin:"32px 0 22px" }}>
    <div style={{ flex:1, height:"1px", background:T.border }} />
    <span style={{ fontSize:10, fontWeight:500, color:T.muted, letterSpacing:"0.1em", textTransform:"uppercase" }}>{label}</span>
    <div style={{ flex:1, height:"1px", background:T.border }} />
  </div>;
}

function Badge({ children, color="neutral" }) {
  const c = { neutral:{bg:T.bg,text:T.muted}, green:{bg:T.greenBg,text:T.green}, gold:{bg:T.goldBg,text:T.gold} }[color];
  return <span style={{ fontSize:11, fontWeight:500, padding:"4px 12px", borderRadius:20, background:c.bg, color:c.text, whiteSpace:"nowrap" }}>{children}</span>;
}

function Toast({ msg }) {
  if (!msg) return null;
  const colors = { success:{bg:T.greenBg,border:"#B8DEC9",text:T.green}, error:{bg:"#FDF0F0",border:"#E8C0C0",text:T.red}, info:{bg:T.goldBg,border:"#D4B88A",text:T.goldDark} };
  const c = colors[msg.type] || colors.info;
  return <div style={{ position:"fixed", bottom:32, right:32, background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:12, padding:"14px 22px", fontSize:13, fontWeight:500, zIndex:999, boxShadow:"0 8px 32px rgba(28,25,23,0.1)", letterSpacing:"0.01em" }}>{msg.message}</div>;
}

// ── SIDEBAR ───────────────────────────────────────────────────
const NAV = [
  { id:"generate", label:"Generate",  sub:"Script Generator" },
  { id:"clients",  label:"Clients",   sub:"Profile Manager"  },
  { id:"history",  label:"History",   sub:"Script Runs"      },
];

function Sidebar({ view, setView, clientCount }) {
  return (
    <nav style={{ width:236, minHeight:"100vh", background:T.char, display:"flex", flexDirection:"column", position:"fixed", top:0, left:0, zIndex:10, borderRight:`1px solid rgba(255,255,255,0.04)` }}>
      <div style={{ height:3, background:`linear-gradient(90deg, ${T.gold}, #D4A96A, ${T.gold})` }} />
      <div style={{ padding:"32px 28px 28px" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:13, fontWeight:400, color:"rgba(255,255,255,0.3)", letterSpacing:"0.16em", textTransform:"uppercase", marginBottom:10 }}>Content Cartel</div>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:26, fontWeight:300, color:"#fff", lineHeight:1.25, letterSpacing:"0.01em" }}>The Perfect<br/><span style={{ fontStyle:"italic", color:T.gold }}>Script</span></div>
      </div>
      <div style={{ height:"1px", background:"rgba(255,255,255,0.06)", margin:"0 20px" }} />
      <div style={{ padding:"20px 14px", flex:1 }}>
        {NAV.map(n => {
          const active = view === n.id;
          return <button key={n.id} onClick={() => setView(n.id)} style={{ width:"100%", display:"block", padding:"12px 16px", marginBottom:3, borderRadius:10, border:"none", cursor:"pointer", textAlign:"left", background:active?"rgba(176,141,90,0.14)":"transparent", borderLeft:active?`2px solid ${T.gold}`:"2px solid transparent", transition:"all 0.15s" }}>
            <div style={{ fontSize:13, fontWeight:500, color:active?T.gold:"rgba(255,255,255,0.6)", letterSpacing:"0.01em" }}>{n.label}</div>
            <div style={{ fontSize:11, color:active?"rgba(176,141,90,0.55)":"rgba(255,255,255,0.25)", marginTop:2 }}>{n.sub}</div>
          </button>;
        })}
      </div>
      <div style={{ padding:"20px 28px 28px", borderTop:"1px solid rgba(255,255,255,0.05)" }}>
        <div style={{ fontSize:11, color:"rgba(255,255,255,0.18)", lineHeight:1.8 }}>
          {clientCount} clients active<br/>
          Claude Opus 4.6<br/>
          <span style={{ color:"rgba(176,141,90,0.5)" }}>~$0.12 per script</span>
        </div>
      </div>
    </nav>
  );
}

// ── CLIENT PANEL (slide-over for add/edit) ────────────────────
function ClientPanel({ client, onClose, onSave }) {
  const isNew = !client.id;
  const [f, setF] = useState({
    client_slug:        client.client_slug || "",
    client_name:        client.client_name || "",
    niche:              client.niche || "",
    tone_of_voice:      client.tone_of_voice || "",
    writing_style:      client.writing_style || "",
    target_audience:    client.target_audience || "",
    avoid_phrases_text: (client.avoid_phrases || []).join("\n"),
    example_hooks_text: (client.example_hooks || []).join("\n"),
    default_topic:      client.default_topic || "",
    sponsor_name:       client.sponsor_name || "",
    sponsor_brief:      client.sponsor_brief || "",
    cta_primary:        client.cta_primary || "",
    cta_secondary:      client.cta_secondary || "",
    script_length_min:  client.script_length_min || 1800,
    script_length_max:  client.script_length_max || 2400,
    active:             client.active !== undefined ? client.active : true,
  });
  const set = k => v => setF(p => ({ ...p, [k]:v }));

  function handleSave() {
    const { avoid_phrases_text, example_hooks_text, ...rest } = f;
    onSave({ ...rest, avoid_phrases:avoid_phrases_text.split("\n").filter(Boolean), example_hooks:example_hooks_text.split("\n").filter(Boolean) });
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(20,17,15,0.6)", display:"flex", alignItems:"flex-start", justifyContent:"flex-end", zIndex:200 }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="panel" style={{ width:600, height:"100vh", background:T.surface, overflowY:"auto", display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"32px 48px 28px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"flex-start", position:"sticky", top:0, background:T.surface, zIndex:1 }}>
          <div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:34, fontWeight:300, color:T.char, lineHeight:1.1 }}>{isNew ? "New Client" : f.client_name}</div>
            {!isNew && <div style={{ fontSize:12, color:T.muted, marginTop:5, fontFamily:"monospace" }}>{f.client_slug}</div>}
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:24, cursor:"pointer", color:T.muted, lineHeight:1, padding:"4px 8px", marginTop:4 }}>×</button>
        </div>

        <div style={{ padding:"8px 48px 60px", flex:1 }}>
          <SectionDivider label="Identity" />
          <Input label="Client Slug" value={f.client_slug} onChange={set("client_slug")} placeholder="tom-wheelwright" readOnly={!isNew} hint={isNew?"Unique ID, cannot change later":undefined} />
          <Input label="Client Name" value={f.client_name} onChange={set("client_name")} placeholder="Tom Wheelwright" />
          <Input label="Niche" value={f.niche} onChange={set("niche")} placeholder="tax strategy, wealth building, real estate" />

          <SectionDivider label="Voice & Style" />
          <TextArea label="Tone of Voice" value={f.tone_of_voice} onChange={set("tone_of_voice")} rows={5} placeholder="How does this person speak? What is their personality and energy?" />
          <TextArea label="Writing Style" value={f.writing_style} onChange={set("writing_style")} rows={4} placeholder="Sentence rhythm, patterns, recurring devices, formatting quirks..." />
          <TextArea label="Target Audience" value={f.target_audience} onChange={set("target_audience")} rows={3} placeholder="Who watches? What do they already know? What do they want?" />
          <TextArea label="Avoid Phrases" hint="one per line" value={f.avoid_phrases_text} onChange={set("avoid_phrases_text")} rows={4} placeholder={"game-changer\nlet's dive in\nin today's video\nhonestly"} />
          <TextArea label="Example Hooks" hint="one per line — Claude matches this energy" value={f.example_hooks_text} onChange={set("example_hooks_text")} rows={6} placeholder={"The IRS actually wrote a roadmap to paying zero in taxes. Most people never read it.\nYour accountant is probably costing you more than they're saving you."} />

          <SectionDivider label="Content Strategy" />
          <Input label="Default Topic" value={f.default_topic} onChange={set("default_topic")} placeholder="The one tax strategy most business owners never use" />
          <Input label="Sponsor Name" value={f.sponsor_name} onChange={set("sponsor_name")} placeholder="WealthAbility" />
          <TextArea label="Sponsor Brief" value={f.sponsor_brief} onChange={set("sponsor_brief")} rows={4} placeholder="What does the sponsor do? Key messages. What makes them worth mentioning?" />
          <Input label="Primary CTA" value={f.cta_primary} onChange={set("cta_primary")} placeholder="Subscribe for weekly tax strategies your CPA doesn't know." />
          <Input label="Secondary CTA" value={f.cta_secondary} onChange={set("cta_secondary")} placeholder="Join the Advantage program via the link in the description." />

          <SectionDivider label="Script Settings" />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
            <Input label="Min Words" value={f.script_length_min} onChange={v=>set("script_length_min")(Number(v))} type="number" />
            <Input label="Max Words" value={f.script_length_max} onChange={v=>set("script_length_max")(Number(v))} type="number" />
          </div>

          <div onClick={() => set("active")(!f.active)} style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 16px", border:`1px solid ${f.active?T.gold:T.border}`, borderRadius:10, marginBottom:36, cursor:"pointer", background:f.active?T.goldBg:"transparent", transition:"all 0.15s" }}>
            <input type="checkbox" checked={f.active} onChange={e=>set("active")(e.target.checked)} style={{ width:16, height:16, accentColor:T.gold, cursor:"pointer" }} onClick={e=>e.stopPropagation()} />
            <div>
              <div style={{ fontSize:14, fontWeight:500, color:f.active?T.goldDark:T.text }}>Active</div>
              <div style={{ fontSize:12, color:f.active?"rgba(139,109,63,0.7)":T.muted, marginTop:1 }}>Included in weekly scheduled runs</div>
            </div>
          </div>

          <div style={{ display:"flex", gap:12 }}>
            <Btn variant="ghost" onClick={onClose} style={{ flex:1, padding:"13px" }}>Cancel</Btn>
            <Btn variant="gold" onClick={handleSave} style={{ flex:2, padding:"13px", fontSize:15 }}>Save Client →</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── GENERATE VIEW ─────────────────────────────────────────────
function GenerateView({ clients, db, onEditClient }) {
  const [slug, setSlug] = useState("");
  const [topic, setTopic] = useState("");
  const [status, setStatus] = useState(null);
  const [result, setResult] = useState(null);
  const active = clients.filter(c => c.active);
  const sel = clients.find(c => c.client_slug === slug);

  async function generate() {
    if (!slug) return;
    setStatus("loading"); setResult(null);
    try {
      const r = await fetch(CONFIG.webhookUrl, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ client_slug:slug, topic_override:topic||undefined }) });
      const data = await r.json();
      setResult(data); setStatus("success");
    } catch { setStatus("error"); }
  }

  return (
    <div className="page">
      <div style={{ marginBottom:56 }}>
        <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Script Generator</div>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95, letterSpacing:"-0.01em" }}>Generate<br/><span style={{ fontStyle:"italic", color:T.gold }}>the script.</span></div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 380px", gap:24, alignItems:"start" }}>
        {/* Client grid */}
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:14 }}>Select client · {active.length} active</div>
          {active.length === 0
            ? <div style={{ padding:"40px 24px", background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, textAlign:"center", fontSize:14, color:T.muted }}>No active clients. Add one in the Clients tab.</div>
            : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:12 }}>
                {active.map(c => {
                  const selected = slug === c.client_slug;
                  return <div key={c.client_slug} onClick={() => setSlug(c.client_slug)} style={{ padding:"20px 22px", borderRadius:14, border:`2px solid ${selected?T.gold:T.border}`, background:selected?T.goldBg:T.surface, cursor:"pointer", transition:"all 0.15s", position:"relative" }}>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:selected?400:300, color:selected?T.goldDark:T.char, lineHeight:1.2, marginBottom:6 }}>{c.client_name}</div>
                    <div style={{ fontSize:12, color:selected?"rgba(139,109,63,0.8)":T.muted, lineHeight:1.5 }}>{c.niche?.split(",").slice(0,2).map(s=>s.trim()).join(" · ") || "—"}</div>
                    {selected && <div style={{ position:"absolute", top:14, right:14, width:8, height:8, borderRadius:"50%", background:T.gold }} />}
                  </div>;
                })}
              </div>
          }
          {sel && <button onClick={() => onEditClient(sel)} style={{ marginTop:14, background:"none", border:"none", fontSize:12, color:T.muted, cursor:"pointer", textDecoration:"underline" }}>Edit {sel.client_name}'s profile →</button>}
        </div>

        {/* Action panel */}
        <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden", position:"sticky", top:32 }}>
          <div style={{ padding:"28px 28px 0" }}>
            <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:8 }}>Topic</div>
            {sel && <div style={{ fontSize:12, color:T.muted, marginBottom:8 }}>Default: <em>{sel.default_topic || "Not set"}</em></div>}
            <textarea value={topic} onChange={e=>setTopic(e.target.value)} rows={4}
              placeholder={sel?.default_topic || "Describe the topic or angle for this script..."}
              style={{...IS, lineHeight:1.7, resize:"none", fontSize:14}} />
          </div>

          <div style={{ padding:"20px 28px 28px" }}>
            <button onClick={generate} disabled={!slug||status==="loading"} style={{
              width:"100%", padding:"18px 24px", background:slug&&status!=="loading"?T.gold:T.border,
              color:slug&&status!=="loading"?"#fff":T.muted, border:"none", borderRadius:10,
              fontSize:16, fontWeight:500, cursor:slug&&status!=="loading"?"pointer":"not-allowed",
              transition:"all 0.2s", letterSpacing:"0.02em", fontFamily:"'Cormorant Garamond',serif",
            }}>
              {status === "loading" ? "Generating..." : !slug ? "Select a client first" : "Generate Script →"}
            </button>

            {status === "loading" && (
              <div style={{ marginTop:16, fontSize:12, color:T.muted, lineHeight:1.8, textAlign:"center" }}>
                Hook → Problem → Content → CTAs → Sponsor → Outro<br/>
                <span style={{ color:T.gold }}>~90 seconds</span>
              </div>
            )}

            {status === "success" && (
              <div style={{ marginTop:16, padding:"16px 18px", background:T.greenBg, borderRadius:10, border:"1px solid #C0DDD0" }}>
                <div style={{ fontSize:13, fontWeight:500, color:T.green, marginBottom:result?.doc_url?8:0 }}>✓ Script ready</div>
                {result?.doc_url && <a href={result.doc_url} target="_blank" style={{ fontSize:13, fontWeight:500, color:T.gold }}>Open in Google Docs →</a>}
              </div>
            )}

            {status === "error" && (
              <div style={{ marginTop:16, padding:"14px 18px", background:"#FDF0F0", borderRadius:10, fontSize:13, color:T.red }}>
                Something went wrong. Check the n8n execution log.
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── CLIENTS VIEW ──────────────────────────────────────────────
function ClientsView({ clients, onReload, db, toast, editClient, setEditClient }) {
  const [delId, setDelId] = useState(null);

  async function saveClient(data) {
    try {
      if (data.id) { const { id, created_at, updated_at, ...rest } = data; await db.patch("client_profiles", id, rest); }
      else { await db.post("client_profiles", data); }
      setEditClient(null); onReload(); toast("Saved", "success");
    } catch(e) { toast("Save failed: " + e.message, "error"); }
  }

  async function deleteClient(id) {
    try { await db.del("client_profiles", id); setDelId(null); onReload(); toast("Deleted", "success"); }
    catch(e) { toast("Failed: " + e.message, "error"); }
  }

  const active = clients.filter(c=>c.active).length;

  return (
    <div className="page">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Profile Manager</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95 }}>Your<br/><span style={{ fontStyle:"italic", color:T.gold }}>clients.</span></div>
          <div style={{ fontSize:14, color:T.muted, marginTop:18 }}>{clients.length} total · {active} active · click any row to edit</div>
        </div>
        <Btn variant="gold" onClick={() => setEditClient({})} style={{ padding:"12px 24px", fontSize:14 }}>+ Add Client</Btn>
      </div>

      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Niche","Default Topic","Sponsor","Status",""].map((h,i) => (
                <th key={i} style={{ padding:"13px 20px", textAlign:i===5?"right":"left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {clients.map((c,i) => (
              <tr key={c.id} className="row-hover" onClick={() => setEditClient(c)} style={{ borderBottom:i<clients.length-1?`1px solid ${T.borderL}`:"none", transition:"background 0.12s" }}>
                <td style={{ padding:"16px 20px" }}>
                  <div style={{ fontSize:14, fontWeight:500, color:T.char }}>{c.client_name}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:2, fontFamily:"monospace" }}>{c.client_slug}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.muted, maxWidth:180 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.niche?.split(",").slice(0,2).join(", ") || "—"}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.text, maxWidth:240 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.default_topic || <span style={{color:T.muted}}>—</span>}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.text, whiteSpace:"nowrap" }}>{c.sponsor_name || <span style={{color:T.muted}}>—</span>}</td>
                <td style={{ padding:"16px 20px" }}><Badge color={c.active?"green":"neutral"}>{c.active?"Active":"Paused"}</Badge></td>
                <td style={{ padding:"16px 20px", textAlign:"right" }}>
                  <span onClick={e=>{e.stopPropagation();setDelId(c.id);}} style={{ fontSize:12, color:T.muted, cursor:"pointer" }}>Delete</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {clients.length === 0 && <div style={{ padding:72, textAlign:"center", color:T.muted, fontSize:14 }}>No clients yet. Add your first one.</div>}
      </div>

      {editClient !== null && <ClientPanel client={editClient} onClose={() => setEditClient(null)} onSave={saveClient} />}

      {delId && (
        <div style={{ position:"fixed", inset:0, background:"rgba(20,17,15,0.6)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300 }}>
          <div style={{ background:T.surface, borderRadius:20, padding:"48px 56px", maxWidth:400, textAlign:"center", boxShadow:"0 16px 80px rgba(28,25,23,0.2)" }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:32, fontWeight:300, color:T.char, marginBottom:12 }}>Delete client?</div>
            <div style={{ fontSize:14, color:T.muted, marginBottom:36, lineHeight:1.7 }}>The profile will be permanently removed. Script run history is kept.</div>
            <div style={{ display:"flex", gap:12 }}>
              <Btn variant="ghost" onClick={() => setDelId(null)} style={{ flex:1, padding:"12px" }}>Cancel</Btn>
              <Btn variant="danger" onClick={() => deleteClient(delId)} style={{ flex:1, padding:"12px" }}>Delete</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────
function HistoryView({ runs, onReload }) {
  return (
    <div className="page">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Script Runs</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95 }}>Run<br/><span style={{ fontStyle:"italic", color:T.gold }}>history.</span></div>
          <div style={{ fontSize:14, color:T.muted, marginTop:18 }}>{runs.length} scripts generated</div>
        </div>
        <Btn variant="ghost" onClick={onReload}>↻ Refresh</Btn>
      </div>

      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Topic","Source","Date","Script"].map((h,i) => (
                <th key={i} style={{ padding:"13px 20px", textAlign:"left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {runs.map((r,i) => (
              <tr key={r.id} style={{ borderBottom:i<runs.length-1?`1px solid ${T.borderL}`:"none" }}>
                <td style={{ padding:"15px 20px", fontSize:14, fontWeight:500, color:T.char, whiteSpace:"nowrap" }}>{r.client_name}</td>
                <td style={{ padding:"15px 20px", fontSize:13, color:T.text, maxWidth:280 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.topic || "—"}</div>
                </td>
                <td style={{ padding:"15px 20px" }}><Badge color={r.triggered_by==="webhook"?"gold":"neutral"}>{r.triggered_by||"—"}</Badge></td>
                <td style={{ padding:"15px 20px", fontSize:13, color:T.muted, whiteSpace:"nowrap" }}>
                  {r.created_at ? new Date(r.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}
                </td>
                <td style={{ padding:"15px 20px" }}>
                  {r.doc_url
                    ? <a href={r.doc_url} target="_blank" style={{ fontSize:13, fontWeight:500, color:T.gold }}>Open →</a>
                    : <span style={{ fontSize:13, color:T.muted }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {runs.length === 0 && <div style={{ padding:72, textAlign:"center", color:T.muted, fontSize:14 }}>No runs yet. Generate your first script.</div>}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("generate");
  const [clients, setClients] = useState([]);
  const [runs, setRuns] = useState([]);
  const [toast, setToast] = useState(null);
  const [editClient, setEditClient] = useState(null);

  const db = sb(CONFIG.supabaseUrl, CONFIG.supabaseKey);

  useEffect(() => {
    loadClients();
    if (view === "history") loadRuns();
  }, [view]);

  async function loadClients() {
    try { const d = await db.get("client_profiles","?select=*&order=client_name.asc"); setClients(Array.isArray(d)?d:[]); } catch {}
  }
  async function loadRuns() {
    try { const d = await db.get("script_runs","?select=*&order=created_at.desc&limit=50"); setRuns(Array.isArray(d)?d:[]); } catch {}
  }
  function showToast(message, type="success") {
    setToast({message,type});
    setTimeout(() => setToast(null), 3000);
  }

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:T.bg }}>
      <Sidebar view={view} setView={setView} clientCount={clients.filter(c=>c.active).length} />
      <main style={{ marginLeft:236, flex:1, padding:"72px 80px", minHeight:"100vh", boxSizing:"border-box" }}>
        {view === "generate" && <GenerateView clients={clients} db={db} onEditClient={c => { setEditClient(c); setView("clients"); }} />}
        {view === "clients"  && <ClientsView clients={clients} onReload={loadClients} db={db} toast={showToast} editClient={editClient} setEditClient={setEditClient} />}
        {view === "history"  && <HistoryView runs={runs} onReload={loadRuns} />}
      </main>
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
