function sb(url, key) {
  const h = { apikey:key, Authorization:`Bearer ${key}`, "Content-Type":"application/json", Prefer:"return=representation" };
  const base = `${url}/rest/v1`;
  async function check(r) {
    if (!r.ok) {
      let msg = `HTTP ${r.status}`;
      try { const e = await r.json(); msg = e.message || e.error || JSON.stringify(e); } catch {}
      throw new Error(msg);
    }
    return r.json();
  }
  return {
    get:   (t, q="")  => fetch(`${base}/${t}${q}`, { headers:h }).then(r => r.json()),
    post:  (t, d)     => fetch(`${base}/${t}`, { method:"POST", headers:h, body:JSON.stringify(d) }).then(check),
    patch: (t, id, d) => fetch(`${base}/${t}?id=eq.${id}`, { method:"PATCH", headers:h, body:JSON.stringify(d) }).then(check),
    del:   (t, id)    => fetch(`${base}/${t}?id=eq.${id}`, { method:"DELETE", headers:h }),
  };
}

// ── SHARED ────────────────────────────────────────────────────
function Btn({ children, variant="primary", onClick, disabled, full, style={} }) {
  const base = { display:"inline-flex", alignItems:"center", justifyContent:"center", gap:8, padding:"11px 24px", borderRadius:8, fontSize:14, fontWeight:500, cursor:disabled?"not-allowed":"pointer", border:"none", transition:"all 0.15s", width:full?"100%":undefined, letterSpacing:"0.01em", ...style };
  const v = {
    primary: { background:T.char, color:"#fff", opacity:disabled?0.4:1 },
    gold:    { background:T.gold, color:"#fff", opacity:disabled?0.4:1 },
    ghost:   { background:"transparent", color:T.text, border:`1px solid ${T.border}` },
    danger:  { background:T.red, color:"#fff" },
    link:    { background:"none", color:T.gold, padding:0, fontWeight:500, fontSize:13 },
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...v[variant]}}>{children}</button>;
}

const IS = { width:"100%", padding:"11px 15px", border:`1px solid ${T.border}`, borderRadius:8, fontSize:14, color:T.text, background:T.surface, outline:"none", boxSizing:"border-box" };

function Field({ label, hint, sub, children, mb=20 }) {

function Input({ label, hint, sub, value, onChange, type="text", placeholder, readOnly, mb }) {

}

function TextArea({ label, hint, sub, value, onChange, placeholder, rows=4, mb }) {

function SectionDivider({ label }) {

function Badge({ children, color="neutral" }) {

function Toast({ msg }) {
  if (!msg) return null;
  const colors = { success:{bg:T.greenBg,border:"#B8DEC9",text:T.green}, error:{bg:"#FDF0F0",border:"#E8C0C0",text:T.red}, info:{bg:T.goldBg,border:"#D4B88A",text:T.goldDark} };
  const c = colors[msg.type] || colors.info;
  return <div style={{ position:"fixed", bottom:32, right:32, background:c.bg, color:c.text, border:`1px solid ${c.border}`, borderRadius:12, padding:"14px 22px", fontSize:13, fontWeight:500, zIndex:999, boxShadow:"0 8px 32px rgba(28,25,23,0.1)" }}>{msg.message}</div>;
}

// ── TOPIC QUEUE MANAGER ───────────────────────────────────────
function TopicQueue({ topics, onChange }) {
  const [newTopic, setNewTopic] = useState("");

  function add() {
    if (!newTopic.trim()) return;
    onChange([...topics, newTopic.trim()]);
    setNewTopic("");
  }

  function remove(i) {
    onChange(topics.filter((_, idx) => idx !== i));
  }

  function moveUp(i) {
    if (i === 0) return;
    const arr = [...topics];
    [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
    onChange(arr);
  }

  function moveDown(i) {
    if (i === topics.length - 1) return;
    const arr = [...topics];
    [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
    onChange(arr);
  }

  return (
    <div>
      <div style={{ fontSize:12, color:T.muted, marginBottom:12, lineHeight:1.6 }}>
        Topics rotate automatically each week. First in line gets used first.
      </div>
      {topics.length === 0
        ? <div style={{ padding:"20px 16px", background:T.bg, borderRadius:8, fontSize:13, color:T.muted, textAlign:"center", marginBottom:12 }}>No topics in queue — default topic will be used on repeat.</div>
        : <div style={{ marginBottom:12, border:`1px solid ${T.border}`, borderRadius:10, overflow:"hidden" }}>
            {topics.map((t, i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", borderBottom:i<topics.length-1?`1px solid ${T.borderL}`:"none", background:i===0?T.goldBg:T.surface }}>
                <div style={{ fontSize:11, fontWeight:500, color:i===0?T.gold:T.muted, minWidth:20, textAlign:"center" }}>{i===0?"→":i+1}</div>
                <div style={{ flex:1, fontSize:13, color:T.text, lineHeight:1.5 }}>{t}</div>
                <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                  <button onClick={() => moveUp(i)} disabled={i===0} style={{ background:"none", border:"none", cursor:i===0?"default":"pointer", color:i===0?T.borderL:T.muted, fontSize:14, padding:"2px 6px" }}>↑</button>
                  <button onClick={() => moveDown(i)} disabled={i===topics.length-1} style={{ background:"none", border:"none", cursor:i===topics.length-1?"default":"pointer", color:i===topics.length-1?T.borderL:T.muted, fontSize:14, padding:"2px 6px" }}>↓</button>
                  <button onClick={() => remove(i)} style={{ background:"none", border:"none", cursor:"pointer", color:T.muted, fontSize:16, padding:"2px 6px", lineHeight:1 }}>×</button>
                </div>
              </div>
            ))}
          </div>
      }
      <div style={{ display:"flex", gap:8 }}>
        <input
          type="text"
          value={newTopic}
          onChange={e => setNewTopic(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()}
          placeholder="Add a topic and press Enter..."
          style={{...IS, flex:1}}
        />
        <button onClick={add} style={{ padding:"11px 18px", background:T.char, color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:500, cursor:"pointer", whiteSpace:"nowrap" }}>Add</button>
      </div>
    </div>
  );
}

            <Btn variant="gold" onClick={handleSave} style={{ flex:2, padding:"13px", fontSize:15 }}>Save Client →</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PDF GENERATOR ────────────────────────────────────────────
function downloadPDF(scriptText, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pw = doc.internal.pageSize.width;
  const ph = doc.internal.pageSize.height;
  const ml = 22, mr = 22, mt = 24, mb = 22;
  const cw = pw - ml - mr;

  // ── PALETTE ────────────────────────────────────────────────
  const C = {
    char:     [28,  25,  20],
    gold:     [176, 141, 90],
    goldDark: [139, 109, 63],
    goldBg:   [245, 235, 215],
    muted:    [120, 112, 100],
    white:    [255, 255, 255],
    offwhite: [252, 250, 246],
    light:    [238, 234, 228],
    insight:  [248, 244, 238],
    ctaBg:    [240, 235, 222],
    midCta:   [235, 228, 210],
  };

  let y = mt;
  let pageNum = 0;

  function rgb(arr, type='fill') {
    if (type==='fill') doc.setFillColor(...arr);
    else doc.setTextColor(...arr);
  }

  function newPage() {
    doc.addPage();
    pageNum++;
    y = mt;
    // Subtle top border line
    doc.setDrawColor(...C.gold);
    doc.setLineWidth(0.4);
    doc.line(ml, 12, pw-mr, 12);
    // Footer
    doc.setFont('helvetica','normal');
    doc.setFontSize(7.5);
    rgb(C.muted,'text');
    doc.text('CONTENT CARTEL  ·  CONFIDENTIAL', ml, ph-10);
    doc.text(`${pageNum}`, pw-mr, ph-10, {align:'right'});
    y = mt;
  }

  function check(needed=10) {
    if (y + needed > ph - mb - 10) { newPage(); return true; }
    return false;
  }

  function hline(yp, color=C.light, w=0.3) {
    doc.setDrawColor(...color);
    doc.setLineWidth(w);
    doc.line(ml, yp, pw-mr, yp);
  }

  // ── COVER PAGE ─────────────────────────────────────────────
  pageNum = 1;
  // Full dark background
  rgb(C.char,'fill');
  doc.rect(0, 0, pw, ph, 'F');

  // Top label
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setCharSpace(3);
  rgb(C.gold,'text');
  doc.text('CONTENT CARTEL', ml, 22);
  doc.setCharSpace(0);

  // Gold accent line
  doc.setDrawColor(...C.gold);
  doc.setLineWidth(0.5);
  doc.line(ml, 28, ml+40, 28);

  // Parse title and meta from scriptText
  const lines = scriptText.split('\n');
  let i = 0;
  while (i < lines.length && !lines[i].trim()) i++;
  const titleText = lines[i]?.trim() || filename || 'Script';
  i++;
  while (i < lines.length && !lines[i].trim()) i++;
  const metaText = lines[i]?.trim() || '';
  if (metaText.startsWith('Script for')) i++;

  // Title — large white
  doc.setFont('helvetica','bold');
  doc.setFontSize(26);
  rgb(C.white,'text');
  const titleLines = doc.splitTextToSize(titleText, cw);
  let ty = 50;
  for (const tl of titleLines) {
    doc.text(tl, ml, ty);
    ty += 11;
  }

  // Meta subtitle
  if (metaText) {
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    rgb(C.gold,'text');
    doc.text(metaText, ml, ty + 6);
    ty += 14;
  }

  // Decorative gold bar
  rgb(C.goldDark,'fill');
  doc.rect(ml, ty + 6, 8, 1, 'F');

  // Bottom of cover: page label
  doc.setFont('helvetica','normal');
  doc.setFontSize(7.5);
  doc.setCharSpace(1.5);
  rgb(C.muted,'text');
  doc.text('CONFIDENTIAL', ml, ph - 14);
  doc.setCharSpace(0);

  // ── HELPER: SECTION HEADER ─────────────────────────────────
  function sectionHeader(label) {
    // Always start a new page for major sections
    const isMajor = /^(OPENING HOOK|SECTION \d|FINAL CLOSE|MID CTA|OUTRO)/.test(label.trim());
    if (isMajor && y > mt + 5) { newPage(); }
    else { check(20); y += 4; }

    // Dark bar
    rgb(C.char,'fill');
    const llines = doc.splitTextToSize(label.replace(/===/g,'').trim(), cw - 8);
    const bh = llines.length * 7 + 7;
    doc.rect(ml, y, cw, bh, 'F');

    // Gold left accent
    rgb(C.gold,'fill');
    doc.rect(ml, y, 3, bh, 'F');

    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    rgb(C.white,'text');
    doc.text(llines, ml + 8, y + 6.5);
    y += bh + 8;
    rgb(C.char,'text');
  }

  // ── HELPER: SUB LABEL (Talking points:, Action steps: etc) ─
  function subLabel(label) {
    check(10);
    doc.setFont('helvetica','bold');
    doc.setFontSize(9.5);
    rgb(C.goldDark,'text');
    doc.text(label, ml, y);
    y += 6;
    rgb(C.char,'text');
  }

  // ── HELPER: BULLET ──────────────────────────────────────────
  function bullet(text) {
    const clean = text.replace(/^[●•\-]\s*/,'');
    const wrapped = doc.splitTextToSize(clean, cw - 9);
    for (const wl of wrapped) {
      check(6);
      rgb(C.gold,'fill');
      doc.circle(ml + 2.5, y - 1.3, 0.9, 'F');
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      rgb(C.char,'text');
      doc.text(wl, ml + 7, y);
      y += 5.5;
    }
    y += 0.5;
  }

  // ── HELPER: TOM'S INSIGHT ───────────────────────────────────
  function tomsInsight(text) {
    const clean = text.replace(/^Tom's insight:\s*/i,'').trim();
    const wrapped = doc.splitTextToSize(clean, cw - 10);
    const bh = wrapped.length * 5.5 + 10;
    check(bh + 4);
    y += 3;
    rgb(C.insight,'fill');
    doc.rect(ml, y, cw, bh, 'F');
    rgb(C.gold,'fill');
    doc.rect(ml, y, 3, bh, 'F');
    doc.setFont('helvetica','bolditalic');
    doc.setFontSize(8.5);
    rgb(C.goldDark,'text');
    doc.text("Tom's insight", ml + 7, y + 5.5);
    doc.setFont('helvetica','italic');
    doc.setFontSize(9.5);
    rgb(C.char,'text');
    doc.text(wrapped, ml + 7, y + 11);
    y += bh + 6;
  }

  // ── HELPER: MID CTA BOX ─────────────────────────────────────
  function midCtaBox(text) {
    const wrapped = doc.splitTextToSize(text, cw - 10);
    const bh = wrapped.length * 5.5 + 14;
    check(bh + 6);
    y += 4;
    rgb(C.char,'fill');
    doc.rect(ml, y, cw, bh, 'F');
    rgb(C.gold,'fill');
    doc.rect(ml, y, 3, bh, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setCharSpace(1.5);
    rgb(C.gold,'text');
    doc.text('MID CTA', ml + 7, y + 6);
    doc.setCharSpace(0);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9.5);
    rgb(C.white,'text');
    doc.text(wrapped, ml + 7, y + 12);
    y += bh + 6;
    rgb(C.char,'text');
  }

  // ── HELPER: WHITEBOARD ──────────────────────────────────────
  function whiteboard(text) {
    const clean = text.replace(/^Whiteboard example:\s*/i,'').trim();
    const wrapped = doc.splitTextToSize(clean, cw - 10);
    const bh = wrapped.length * 5.5 + 10;
    check(bh + 4);
    y += 2;
    doc.setDrawColor(...C.gold);
    doc.setLineWidth(0.4);
    doc.roundedRect(ml, y, cw, bh, 2, 2, 'D');
    doc.setFont('helvetica','bolditalic');
    doc.setFontSize(8.5);
    rgb(C.goldDark,'text');
    doc.text('Whiteboard example', ml + 4, y + 5.5);
    doc.setFont('helvetica','italic');
    doc.setFontSize(9.5);
    rgb(C.char,'text');
    doc.text(wrapped, ml + 4, y + 11);
    y += bh + 5;
  }

  // ── HELPER: SPEAKER LINE (TOM to camera staccato) ───────────
  function speakerLine(text) {
    check(7);
    doc.setFont('helvetica','normal');
    doc.setFontSize(11);
    rgb(C.char,'text');
    const wrapped = doc.splitTextToSize(text, cw);
    for (const wl of wrapped) {
      check(6.5);
      doc.text(wl, ml, y);
      y += 6.5;
    }
  }

  // ── HELPER: BODY TEXT ────────────────────────────────────────
  function bodyText(text) {
    check(6);
    const wrapped = doc.splitTextToSize(text, cw);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    rgb(C.char,'text');
    for (const wl of wrapped) {
      check(6);
      doc.text(wl, ml, y);
      y += 5.5;
    }
    y += 1.5;
  }

  // ── PARSE AND RENDER ─────────────────────────────────────────
  newPage();

  // Skip title and meta (already on cover)
  i; // already advanced past title/meta above

  let inQC = false, qcLines = [];
  let inInsight = false, insightBuf = [];
  let inMidCta = false, midCtaBuf = [], midCtaDash = false;
  let speakerMode = false;

  while (i < lines.length) {
    const raw = lines[i]; i++;
    const t = raw.trim();

    // Skip dividers
    if (/^-{5,}$/.test(t) || /^={5,}$/.test(t)) {
      speakerMode = false;
      if (inInsight) { tomsInsight(insightBuf.join(' ')); inInsight=false; insightBuf=[]; }
      if (inMidCta && midCtaBuf.length) { midCtaBox(midCtaBuf.join('\n')); inMidCta=false; midCtaBuf=[]; midCtaDash=false; }
      y += 2; continue;
    }

    // QC block
    if (t.startsWith('QUALITY CHECK')) { inQC=true; qcLines=[t]; continue; }
    if (inQC) {
      if (t.startsWith('===') || t.startsWith('HOOK') || t.startsWith('OPENING') || t.startsWith('SECTION') || t.startsWith('MAIN')) {
        inQC=false;
        // Show compact QC
        const qcText = qcLines.join(' ');
        const wrapped = doc.splitTextToSize(qcText, cw-8);
        const bh = Math.min(wrapped.length, 6)*5+10;
        rgb(C.offwhite,'fill');
        doc.setDrawColor(...C.gold);
        doc.setLineWidth(0.3);
        doc.roundedRect(ml, y, cw, bh, 2,2,'FD');
        doc.setFont('helvetica','italic'); doc.setFontSize(8); rgb(C.muted,'text');
        doc.text(doc.splitTextToSize(qcText, cw-8).slice(0,6), ml+4, y+5);
        y += bh+6;
        // fall through to process current line
        qcLines=[];
      } else { qcLines.push(t); continue; }
    }

    // Flush insight buffer if new section starts
    if (inInsight && (t.startsWith('SECTION') || t.startsWith('FINAL') || t.startsWith('MID CTA') || t.startsWith('---') || t === '')) {
      if (t !== '') { tomsInsight(insightBuf.join(' ')); inInsight=false; insightBuf=[]; }
      else { insightBuf.push(''); continue; }
    }
    if (inInsight) { insightBuf.push(t); continue; }

    // Flush mid CTA
    if (inMidCta) {
      if (t === '–' || t === '-') { midCtaDash=true; continue; }
      if (t.startsWith('SECTION') || t.startsWith('FINAL') || t.startsWith('---')) {
        if (midCtaBuf.length) { midCtaBox(midCtaBuf.join('\n')); }
        inMidCta=false; midCtaBuf=[]; midCtaDash=false;
        // fall through
      } else { if(t) midCtaBuf.push(t); continue; }
    }

    if (!t) { y += speakerMode ? 1.5 : 3; continue; }

    // Section headers
    if (t.startsWith('=== ') && t.endsWith(' ===')) { sectionHeader(t); speakerMode=false; continue; }
    if (/^(OPENING HOOK|HOOK)$/.test(t)) { sectionHeader(t); speakerMode=false; continue; }
    if (/^SECTION \d+:/.test(t)) { sectionHeader(t); speakerMode=false; continue; }
    if (/^FINAL CLOSE/.test(t)) { sectionHeader(t); speakerMode=false; continue; }
    if (/^OUTRO$/.test(t)) { sectionHeader(t); speakerMode=false; continue; }
    if (/^MAIN CONTENT$/.test(t)) { sectionHeader(t); speakerMode=false; continue; }

    // MID CTA header
    if (t === 'MID CTA') { inMidCta=true; continue; }

    // Speaker label
    if (t === 'TOM (to camera):' || t.startsWith('TOM (to camera):')) {
      check(8);
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      rgb(C.goldDark,'text');
      doc.text('TOM (to camera):', ml, y);
      y += 7; speakerMode=true; continue;
    }

    // Sub labels
    if (/^(Talking points|Action steps|Context if needed):?$/.test(t)) { subLabel(t.replace(/:$/,':')); continue; }

    // Tom's insight
    if (/^Tom'?s insight:/i.test(t)) {
      inInsight=true;
      insightBuf=[t.replace(/^Tom'?s insight:\s*/i,'')];
      continue;
    }

    // Whiteboard
    if (/^Whiteboard example:/i.test(t)) { whiteboard(t); continue; }

    // Bullets
    if (/^[●•\-]\s/.test(t)) { bullet(t); continue; }

    // CTA subscribe lines
    if ((t.toLowerCase().includes('subscribe') || t.toLowerCase().includes('cta')) && t.length < 180 && !t.startsWith('Section')) {
      const wrapped = doc.splitTextToSize(t, cw-8);
      const bh = wrapped.length*5.5+10;
      check(bh+4); y+=2;
      rgb(C.goldBg,'fill');
      doc.setDrawColor(...C.gold); doc.setLineWidth(0.3);
      doc.roundedRect(ml,y,cw,bh,2,2,'FD');
      doc.setFont('helvetica','italic'); doc.setFontSize(9.5); rgb(C.goldDark,'text');
      doc.text(wrapped, ml+5, y+6);
      y+=bh+5; continue;
    }

    // Speaker mode staccato lines
    if (speakerMode) { speakerLine(t); continue; }

    // Default body
    bodyText(t);
  }

  // Flush any remaining
  if (inInsight && insightBuf.length) tomsInsight(insightBuf.join(' '));
  if (inMidCta && midCtaBuf.length) midCtaBox(midCtaBuf.join('\n'));

  // ── UPDATE ALL FOOTERS ──────────────────────────────────────
  const total = doc.internal.getNumberOfPages();
  for (let p = 2; p <= total; p++) {
    doc.setPage(p);
    hline(ph-14, C.light, 0.3);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
    doc.setCharSpace(1);
    rgb(C.muted,'text');
    doc.text('CONTENT CARTEL  ·  CONFIDENTIAL', ml, ph-8);
    doc.setCharSpace(0);
    doc.text(`${p-1} / ${total-1}`, pw-mr, ph-8, {align:'right'});
  }

  doc.save((filename||'script')+'.pdf');
}


// ── GENERATE VIEW ─────────────────────────────────────────────
function GenerateView({ clients, onEditClient }) {
  const [slug, setSlug] = useState("");
  const [topic, setTopic] = useState("");
  const [hookAngle, setHookAngle] = useState("");
  const [talkingPoints, setTalkingPoints] = useState("");
  const [extraContext, setExtraContext] = useState("");
  const [runtimeOverride, setRuntimeOverride] = useState(0);
  const [status, setStatus] = useState(null);
  const [runData, setRunData] = useState(null);
  const [pollCount, setPollCount] = useState(0);

  const active = clients.filter(c => c.active);
  const sel = clients.find(c => c.client_slug === slug);

  useEffect(() => {
    if (status !== "loading" || !slug) return;
    const startTime = new Date().toISOString();
    let attempts = 0;
    const timer = setInterval(async () => {
      attempts++;
      setPollCount(attempts);
      if (attempts > 36) { clearInterval(timer); setStatus("timeout"); return; }
      try {
        const db = sb(CONFIG.supabaseUrl, CONFIG.supabaseKey);
        const rows = await db.get('script_runs',
          `?client_slug=eq.${slug}&status=eq.complete&created_at=gt.${startTime}&order=created_at.desc&limit=1`
        );
        if (Array.isArray(rows) && rows.length > 0 && rows[0].status === "complete") {
          clearInterval(timer); setRunData(rows[0]); setStatus("success");
        }
      } catch {}
    }, 5000);
    return () => clearInterval(timer);
  }, [status, slug]);

  async function generate() {
    if (!slug) return;
    setStatus("loading"); setRunData(null); setPollCount(0);
    try {
      await fetch(CONFIG.webhookUrl, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_slug: slug, topic_override: topic||undefined, hook_angle: hookAngle||undefined, talking_points: talkingPoints||undefined, extra_context: extraContext||undefined, runtime_min: runtimeOverride||undefined, runtime_max: runtimeOverride ? Math.round(runtimeOverride*1.2) : undefined })
      });
    } catch {}
  }

  const canGenerate = !!slug && status !== "loading";

  return (
    <div className="page">
      <div style={{ marginBottom:56 }}>
        <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Script Generator</div>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95 }}>Generate<br/><span style={{ fontStyle:"italic", color:T.gold }}>the script.</span></div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 400px", gap:28, alignItems:"start" }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:14 }}>Select client · {active.length} active</div>
          {active.length === 0
            ? <div style={{ padding:"40px 24px", background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, textAlign:"center", fontSize:14, color:T.muted }}>No active clients.</div>
            : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(190px, 1fr))", gap:12 }}>
                {active.map(c => {
                  const selected = slug === c.client_slug;
                  return <div key={c.client_slug} onClick={() => { setSlug(c.client_slug); setStatus(null); setRunData(null); }} style={{ padding:"20px 22px", borderRadius:14, border:`2px solid ${selected?T.gold:T.border}`, background:selected?T.goldBg:T.surface, cursor:"pointer", transition:"all 0.15s", position:"relative" }}>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:selected?400:300, color:selected?T.goldDark:T.char, lineHeight:1.2, marginBottom:6 }}>{c.client_name}</div>
                    <div style={{ fontSize:12, color:selected?"rgba(139,109,63,0.75)":T.muted }}>{c.niche?.split(",")[0]?.trim() || "—"}</div>
                    {c.topic_queue?.length > 0 && <div style={{ fontSize:11, color:selected?T.gold:T.muted, marginTop:4 }}>{c.topic_queue.length} topics queued</div>}
                    <div style={{ fontSize:10, color:selected?T.gold:T.muted, marginTop:3, textTransform:"uppercase", letterSpacing:"0.05em" }}>{c.script_format === "talk_track" ? "Talk Track" : c.script_format === "bullet_brief" ? "Bullet Brief" : "Word for Word"}</div>
                    {selected && <div style={{ position:"absolute", top:14, right:14, width:8, height:8, borderRadius:"50%", background:T.gold }} />}
                  </div>;
                })}
              </div>
          }
          {sel && <button onClick={() => onEditClient(sel)} style={{ marginTop:14, background:"none", border:"none", fontSize:12, color:T.muted, cursor:"pointer", textDecoration:"underline" }}>Edit {sel.client_name}'s profile →</button>}
        </div>

        <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden", position:"sticky", top:32 }}>
          <div style={{ padding:"28px 28px 0" }}>
            <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:7 }}>Topic</div>
            {sel?.topic_queue?.[0] && <div style={{ fontSize:12, color:T.muted, marginBottom:8 }}>Next: <em style={{color:T.text}}>"{sel.topic_queue[0]}"</em></div>}
            <textarea value={topic} onChange={e=>setTopic(e.target.value)} rows={3} placeholder={sel?.topic_queue?.[0] || sel?.default_topic || "Override or leave empty..."} style={{...IS, lineHeight:1.7, resize:"none", fontSize:14}} />
          </div>
          <div style={{ padding:"16px 28px 0" }}>
            <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:8 }}>Target runtime <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0, fontSize:11 }}>optional</span></div>
            <select value={runtimeOverride} onChange={e=>setRuntimeOverride(Number(e.target.value))} style={{ width:"100%", padding:"10px 14px", border:`1px solid ${T.border}`, borderRadius:8, fontSize:14, color:T.text, background:T.surface, outline:"none", appearance:"none", cursor:"pointer" }}>
              {RUNTIME_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
                    <div style={{ padding:"16px 28px 0" }}>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              {HOOK_ANGLES.map(a => <button key={a.id} onClick={() => setHookAngle(hookAngle===a.id?"":a.id)} style={{ padding:"9px 12px", borderRadius:8, border:`1px solid ${hookAngle===a.id?T.gold:T.border}`, background:hookAngle===a.id?T.goldBg:"transparent", cursor:"pointer", fontSize:12, fontWeight:500, color:hookAngle===a.id?T.goldDark:T.text, transition:"all 0.12s" }}>{a.label}</button>)}
            </div>
          </div>
          <div style={{ padding:"16px 28px 0" }}>
            <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:7 }}>Key talking points <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0, fontSize:11 }}>optional</span></div>
            <textarea value={talkingPoints} onChange={e=>setTalkingPoints(e.target.value)} rows={3} placeholder="One point per line" style={{...IS, lineHeight:1.7, resize:"none", fontSize:13}} />
          </div>
          <div style={{ padding:"12px 28px 0" }}>
            <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:7 }}>Extra context <span style={{ fontWeight:400, textTransform:"none", letterSpacing:0, fontSize:11 }}>optional</span></div>
            <textarea value={extraContext} onChange={e=>setExtraContext(e.target.value)} rows={2} placeholder="Anything Claude should know for this script" style={{...IS, lineHeight:1.7, resize:"none", fontSize:13}} />
          </div>
          <div style={{ padding:"20px 28px 28px" }}>
            <button onClick={generate} disabled={!canGenerate} style={{ width:"100%", padding:"18px 24px", background:canGenerate?T.gold:T.border, color:canGenerate?"#fff":T.muted, border:"none", borderRadius:10, fontSize:16, fontWeight:500, cursor:canGenerate?"pointer":"not-allowed", transition:"all 0.2s", letterSpacing:"0.02em", fontFamily:"'Cormorant Garamond',serif" }}>
              {status==="loading" ? "Generating..." : !slug ? "Select a client first" : "Generate Script →"}
            </button>
            {status === "loading" && <div style={{ marginTop:14, fontSize:12, color:T.muted, lineHeight:1.9, textAlign:"center" }}>Checking every 5s · {Math.round(pollCount*5/60*10)/10} min elapsed<br/><span style={{color:T.gold}}>Hook → Content → QC → Fix → Doc</span></div>}
            {status === "success" && runData && (
              <div style={{ marginTop:14 }}>
                <div style={{ padding:"14px 18px", background:T.greenBg, borderRadius:10, border:"1px solid #C0DDD0", marginBottom:10 }}>
                  <div style={{ fontSize:13, fontWeight:500, color:T.green, marginBottom:6 }}>✓ {runData.video_title || "Script ready"}</div>
                  {runData.doc_url && <a href={runData.doc_url} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, fontWeight:500, color:T.gold }}>Open in Google Docs →</a>}
                </div>
                {runData.full_script && <button onClick={() => downloadPDF(runData.full_script, runData.doc_title || 'script')} style={{ width:"100%", padding:"13px", background:T.char, color:"#fff", border:"none", borderRadius:10, fontSize:14, fontWeight:500, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>↓ Download PDF</button>}
              </div>
            )}
            {status === "timeout" && <div style={{ marginTop:14, padding:"14px 18px", background:"#FDF0F0", borderRadius:10, fontSize:13, color:T.red }}>Timeout after 3 minutes. Check n8n executions.</div>}
            {status === "error" && <div style={{ marginTop:14, padding:"14px 18px", background:"#FDF0F0", borderRadius:10, fontSize:13, color:T.red }}>Something went wrong. Check the n8n execution log.</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── CLIENTS VIEW

// ── CLIENTS VIEW ──────────────────────────────────────────────
function ClientsView({ clients, onReload, db, toast, editClient, setEditClient }) {
  const [delId, setDelId] = useState(null);

  async function saveClient(data) {
    try {
      if (data.id) { const { id, created_at, updated_at, ...rest } = data; await db.patch("client_profiles", id, rest); }
      else { const { id, created_at, updated_at, ...rest } = data; await db.post("client_profiles", rest); }
      setEditClient(null); onReload(); toast("Saved", "success");
    } catch(e) { toast("Save failed: " + e.message, "error"); }
  }

  async function deleteClient(id) {
    try { await db.del("client_profiles", id); setDelId(null); onReload(); toast("Deleted", "success"); }
    catch(e) { toast("Failed: " + e.message, "error"); }
  }

  return (
    <div className="page">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Profile Manager</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95 }}>Your<br/><span style={{ fontStyle:"italic", color:T.gold }}>clients.</span></div>
          <div style={{ fontSize:14, color:T.muted, marginTop:18 }}>{clients.length} total · {clients.filter(c=>c.active).length} active · click any row to edit</div>
        </div>
        <Btn variant="gold" onClick={() => setEditClient({})} style={{ padding:"12px 24px", fontSize:14 }}>+ Add Client</Btn>
      </div>

      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Niche","Topic queue","Sponsor","Status",""].map((h,i) => (
                <th key={i} style={{ padding:"13px 20px", textAlign:i===5?"right":"left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {clients.map((c,i) => (
              <tr key={c.id} className="row-hover" onClick={() => setEditClient(c)} style={{ borderBottom:i<clients.length-1?`1px solid ${T.borderL}`:"none", transition:"background 0.12s" }}>
                <td style={{ padding:"16px 20px" }}>
                  <div style={{ fontSize:14, fontWeight:500, color:T.char }}>{c.client_name}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:2, fontFamily:"monospace" }}>{c.client_slug}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.muted, maxWidth:160 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.niche?.split(",").slice(0,2).join(", ") || "—"}</div>
                </td>
                <td style={{ padding:"16px 20px" }}>
                  {c.topic_queue?.length > 0
                    ? <div>
                        <span style={{ fontSize:13, fontWeight:500, color:T.gold }}>{c.topic_queue.length} topic{c.topic_queue.length!==1?"s":""}</span>
                        <div style={{ fontSize:11, color:T.muted, marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:180 }}>Next: {c.topic_queue[0]}</div>
                      </div>
                    : <span style={{ fontSize:13, color:T.muted }}>Using default</span>}
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.text, whiteSpace:"nowrap" }}>{c.sponsor_name || <span style={{color:T.muted}}>—</span>}</td>
                <td style={{ padding:"16px 20px" }}><Badge color={c.active?"green":"neutral"}>{c.active?"Active":"Paused"}</Badge></td>
                <td style={{ padding:"16px 20px", textAlign:"right" }}>
                  <span onClick={e=>{e.stopPropagation();setDelId(c.id);}} style={{ fontSize:12, color:T.muted, cursor:"pointer" }}>Delete</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {clients.length === 0 && <div style={{ padding:72, textAlign:"center", color:T.muted, fontSize:14 }}>No clients yet. Add your first one.</div>}
      </div>

      {editClient !== null && <ClientPanel client={editClient} onClose={() => setEditClient(null)} onSave={saveClient} />}

      {delId && (
        <div style={{ position:"fixed", inset:0, background:"rgba(20,17,15,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300 }}>
          <div style={{ background:T.surface, borderRadius:20, padding:"48px 56px", maxWidth:400, textAlign:"center", boxShadow:"0 16px 80px rgba(28,25,23,0.2)" }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:32, fontWeight:300, color:T.char, marginBottom:12 }}>Delete client?</div>
            <div style={{ fontSize:14, color:T.muted, marginBottom:36, lineHeight:1.7 }}>The profile will be permanently removed. Script run history is kept.</div>
            <div style={{ display:"flex", gap:12 }}>
              <Btn variant="ghost" onClick={() => setDelId(null)} style={{ flex:1, padding:"12px" }}>Cancel</Btn>
              <Btn variant="danger" onClick={() => deleteClient(delId)} style={{ flex:1, padding:"12px" }}>Delete</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────
function HistoryView({ runs, onReload }) {
  return (
    <div className="page">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:14 }}>Script Runs</div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:64, fontWeight:300, color:T.char, lineHeight:0.95 }}>Run<br/><span style={{ fontStyle:"italic", color:T.gold }}>history.</span></div>
          <div style={{ fontSize:14, color:T.muted, marginTop:18 }}>{runs.length} scripts generated</div>
        </div>
        <Btn variant="ghost" onClick={onReload}>↻ Refresh</Btn>
      </div>

      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Topic","Source","Date","Script"].map((h,i) => (
                <th key={i} style={{ padding:"13px 20px", textAlign:"left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.07em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {runs.map((r,i) => (
              <tr key={r.id} style={{ borderBottom:i<runs.length-1?`1px solid ${T.borderL}`:"none" }}>
                <td style={{ padding:"15px 20px", fontSize:14, fontWeight:500, color:T.char, whiteSpace:"nowrap" }}>{r.client_name}</td>
                <td style={{ padding:"15px 20px", fontSize:13, color:T.text, maxWidth:300 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.topic || "—"}</div>
                </td>
                <td style={{ padding:"15px 20px" }}><Badge color={r.triggered_by==="webhook"?"gold":"neutral"}>{r.triggered_by||"—"}</Badge></td>
                <td style={{ padding:"15px 20px", fontSize:13, color:T.muted, whiteSpace:"nowrap" }}>
                  {r.created_at ? new Date(r.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "—"}
                </td>
                <td style={{ padding:"15px 20px" }}>
                  {r.doc_url
                    ? <a href={r.doc_url} target="_blank" style={{ fontSize:13, fontWeight:500, color:T.gold }}>Open →</a>
                    : <span style={{ fontSize:13, color:T.muted }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {runs.length === 0 && <div style={{ padding:72, textAlign:"center", color:T.muted, fontSize:14 }}>No runs yet. Generate your first script.</div>}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  const [view, setView] = useState("generate");
  const [clients, setClients] = useState([]);
  const [runs, setRuns] = useState([]);
  const [toast, setToast] = useState(null);
  const [editClient, setEditClient] = useState(null);

  const db = sb(CONFIG.supabaseUrl, CONFIG.supabaseKey);

  useEffect(() => {
    loadClients();
    if (view === "history") loadRuns();
  }, [view]);

  async function loadClients() {
    try { const d = await db.get("client_profiles","?select=*&order=client_name.asc"); setClients(Array.isArray(d)?d:[]); } catch {}
  }
  async function loadRuns() {
    try { const d = await db.get("script_runs","?select=*&order=created_at.desc&limit=50"); setRuns(Array.isArray(d)?d:[]); } catch {}
  }
  function showToast(message, type="success") {
    setToast({message,type});
    setTimeout(() => setToast(null), 3000);
  }

  function handleEditClient(c) {
    setEditClient(c);
    setView("clients");
  }

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:T.bg }}>
      <Sidebar view={view} setView={setView} clientCount={clients.filter(c=>c.active).length} />
      <main style={{ marginLeft:236, flex:1, padding:"72px 80px", minHeight:"100vh", boxSizing:"border-box" }}>
        {view === "generate" && <GenerateView clients={clients} onEditClient={handleEditClient} />}
        {view === "clients"  && <ClientsView clients={clients} onReload={loadClients} db={db} toast={showToast} editClient={editClient} setEditClient={setEditClient} />}
        {view === "history"  && <HistoryView runs={runs} onReload={loadRuns} />}
      </main>
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
