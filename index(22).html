<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Perfect Script · Content Cartel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F6F4EF; --surface: #fff; --s2: #FAF9F6;
    --gold: #B08D5A; --goldBg: #F4EDE0; --goldMid: rgba(176,141,90,0.16);
    --char: #1A1714; --text: #2D2A26; --muted: #9A8F85;
    --border: #E6E1D8; --borderL: #F0EDE8;
    --red: #B34040; --green: #3A7A60; --greenBg: #EAF4EE;
  }
  html, body, #root { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  input, textarea, button, select { font-family: 'DM Sans', sans-serif; }
  input, textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--text);
    background: var(--surface); outline: none;
  }
  input:focus, textarea:focus { border-color: var(--gold); }
  textarea { resize: vertical; line-height: 1.65; }
  a { color: var(--gold); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const T = {
  bg:"#F6F4EF", surface:"#fff", s2:"#FAF9F6",
  gold:"#B08D5A", goldBg:"#F4EDE0", goldMid:"rgba(176,141,90,0.16)",
  char:"#1A1714", text:"#2D2A26", muted:"#9A8F85",
  border:"#E6E1D8", borderL:"#F0EDE8",
  red:"#B34040", green:"#3A7A60", greenBg:"#EAF4EE",
};

// ── SUPABASE CLIENT ─────────────────────────────────────────
function sb(url, key) {
  const h = { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation" };
  const base = `${url}/rest/v1`;
  return {
    get:   (t, q="")    => fetch(`${base}/${t}${q}`, { headers: h }).then(r => r.json()),
    post:  (t, d)       => fetch(`${base}/${t}`, { method:"POST", headers: h, body: JSON.stringify(d) }).then(r => r.json()),
    patch: (t, id, d)   => fetch(`${base}/${t}?id=eq.${id}`, { method:"PATCH", headers: h, body: JSON.stringify(d) }).then(r => r.json()),
    del:   (t, id)      => fetch(`${base}/${t}?id=eq.${id}`, { method:"DELETE", headers: h }),
  };
}

// ── SHARED COMPONENTS ────────────────────────────────────────
function Btn({ children, variant="primary", onClick, disabled, full, style={} }) {
  const base = { padding:"10px 22px", borderRadius:8, fontSize:14, fontWeight:500, cursor: disabled ? "not-allowed" : "pointer", border:"none", transition:"opacity 0.15s", fontFamily:"'DM Sans',sans-serif", width: full ? "100%" : undefined, ...style };
  const v = {
    primary: { background: T.char, color:"#fff", opacity: disabled ? 0.4 : 1 },
    gold:    { background: T.gold, color:"#fff", opacity: disabled ? 0.4 : 1 },
    ghost:   { background:"transparent", color: T.text, border:`1px solid ${T.border}` },
    danger:  { background: T.red, color:"#fff" },
    link:    { background:"none", color: T.gold, padding:0, fontWeight:500 },
  };
  return <button onClick={disabled ? undefined : onClick} style={{ ...base, ...v[variant] }}>{children}</button>;
}

function Field({ label, hint, children }) {
  return (
    <div style={{ marginBottom:20 }}>
      {label && (
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <label style={{ fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.06em", textTransform:"uppercase" }}>{label}</label>
          {hint && <span style={{ fontSize:11, color:T.muted }}>{hint}</span>}
        </div>
      )}
      {children}
    </div>
  );
}

const inputStyle = { width:"100%", padding:"10px 14px", border:`1px solid ${T.border}`, borderRadius:8, fontSize:14, color:T.text, background:T.surface, outline:"none", boxSizing:"border-box" };

function Input({ label, hint, value, onChange, type="text", placeholder, readOnly }) {
  return (
    <Field label={label} hint={hint}>
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} readOnly={readOnly}
        style={{ ...inputStyle, background: readOnly ? T.bg : T.surface, color: readOnly ? T.muted : T.text }} />
    </Field>
  );
}

function TextArea({ label, hint, value, onChange, placeholder, rows=4 }) {
  return (
    <Field label={label} hint={hint}>
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...inputStyle, lineHeight:1.65, resize:"vertical" }} />
    </Field>
  );
}

function Divider({ label }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:12, margin:"28px 0 20px" }}>
      <div style={{ flex:1, height:1, background:T.border }} />
      <span style={{ fontSize:10, fontWeight:500, color:T.muted, letterSpacing:"0.1em", textTransform:"uppercase" }}>{label}</span>
      <div style={{ flex:1, height:1, background:T.border }} />
    </div>
  );
}

function Badge({ children, color="neutral" }) {
  const c = { neutral:{ bg:T.bg, text:T.muted }, green:{ bg:T.greenBg, text:T.green }, gold:{ bg:T.goldBg, text:T.gold } }[color];
  return <span style={{ fontSize:11, fontWeight:500, padding:"3px 10px", borderRadius:20, background:c.bg, color:c.text }}>{children}</span>;
}

function Toast({ message, type }) {
  const bg = type === "success" ? T.greenBg : type === "error" ? "#FDF0F0" : T.goldBg;
  const color = type === "success" ? T.green : type === "error" ? T.red : T.gold;
  return (
    <div style={{ position:"fixed", bottom:32, right:32, background:bg, color, border:`1px solid ${color}30`, borderRadius:10, padding:"14px 20px", fontSize:13, fontWeight:500, zIndex:999, boxShadow:"0 4px 20px rgba(28,25,23,0.1)" }}>
      {message}
    </div>
  );
}

// ── SETUP SCREEN ─────────────────────────────────────────────
function SetupScreen({ onSave }) {
  const [f, setF] = useState({ supabaseUrl:"", supabaseKey:"", webhookUrl:"" });
  const set = k => v => setF(p => ({ ...p, [k]:v }));
  return (
    <div style={{ minHeight:"100vh", background:T.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ width:480 }}>
        <div style={{ marginBottom:48 }}>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:300, color:T.char, lineHeight:1 }}>The Perfect<br/>Script</div>
          <div style={{ fontSize:13, color:T.muted, marginTop:16, lineHeight:1.7 }}>Connect your Supabase project and n8n webhook to begin generating scripts for your clients.</div>
        </div>
        <div style={{ background:T.surface, borderRadius:20, padding:"40px 44px", boxShadow:"0 4px 40px rgba(28,25,23,0.06)" }}>
          <Input label="Supabase Project URL" value={f.supabaseUrl} onChange={set("supabaseUrl")} placeholder="https://xxxx.supabase.co" />
          <Input label="Supabase Anon Key" value={f.supabaseKey} onChange={set("supabaseKey")} placeholder="eyJhbGci..." />
          <Input label="n8n Webhook URL" value={f.webhookUrl} onChange={set("webhookUrl")} placeholder="https://your-n8n.com/webhook/generate-script" />
          <Btn variant="gold" full onClick={() => onSave(f)} style={{ padding:"14px", marginTop:8 }}>Connect workspace →</Btn>
        </div>
        <div style={{ textAlign:"center", marginTop:20, fontSize:11, color:T.muted }}>Content Cartel · The Perfect Script</div>
      </div>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────
const NAV = [
  { id:"generate", label:"Generate",  sub:"Script Generator" },
  { id:"clients",  label:"Clients",   sub:"Profile Manager"  },
  { id:"history",  label:"History",   sub:"Script Runs"      },
  { id:"settings", label:"Settings",  sub:"Configuration"    },
];

function Sidebar({ view, setView, clientCount }) {
  return (
    <nav style={{ width:228, minHeight:"100vh", background:T.char, display:"flex", flexDirection:"column", position:"fixed", top:0, left:0, zIndex:10 }}>
      <div style={{ padding:"36px 28px 28px", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:400, color:"#fff", lineHeight:1.3 }}>The Perfect Script</div>
        <div style={{ fontSize:10, color:"rgba(255,255,255,0.28)", marginTop:6, letterSpacing:"0.12em" }}>CONTENT CARTEL</div>
      </div>
      <div style={{ padding:"20px 14px", flex:1 }}>
        {NAV.map(n => {
          const active = view === n.id;
          return (
            <button key={n.id} onClick={() => setView(n.id)} style={{
              width:"100%", display:"block", padding:"11px 16px", marginBottom:2,
              borderRadius:10, border:"none", cursor:"pointer", textAlign:"left",
              background: active ? T.goldMid : "transparent",
              borderLeft: active ? `2px solid ${T.gold}` : "2px solid transparent",
              transition:"all 0.12s",
            }}>
              <div style={{ fontSize:13, fontWeight:500, color: active ? T.gold : "rgba(255,255,255,0.65)" }}>{n.label}</div>
              <div style={{ fontSize:11, color: active ? "rgba(176,141,90,0.6)" : "rgba(255,255,255,0.28)", marginTop:1 }}>{n.sub}</div>
            </button>
          );
        })}
      </div>
      <div style={{ padding:"16px 28px", borderTop:"1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ fontSize:10, color:"rgba(255,255,255,0.18)", lineHeight:1.7 }}>{clientCount} clients<br/>Claude Opus 4.6 · ~$0.12/script</div>
      </div>
    </nav>
  );
}

// ── GENERATE VIEW ─────────────────────────────────────────────
function GenerateView({ clients, config }) {
  const [slug, setSlug] = useState("");
  const [topic, setTopic] = useState("");
  const [status, setStatus] = useState(null);
  const [result, setResult] = useState(null);
  const active = clients.filter(c => c.active);
  const sel = clients.find(c => c.client_slug === slug);

  async function generate() {
    if (!slug) return;
    setStatus("loading"); setResult(null);
    try {
      const r = await fetch(config.webhookUrl, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ client_slug: slug, topic_override: topic || undefined }),
      });
      const data = await r.json();
      setResult(data); setStatus("success");
    } catch { setStatus("error"); }
  }

  return (
    <div style={{ maxWidth:700 }}>
      <div style={{ marginBottom:52 }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:300, color:T.char, lineHeight:1.05 }}>Generate a Script</div>
        <div style={{ fontSize:14, color:T.muted, marginTop:14, lineHeight:1.6 }}>Select a client, optionally override the topic, and hit generate. Runs 6 sequential Claude prompts and lands in Google Docs.</div>
      </div>
      <div style={{ background:T.surface, borderRadius:20, padding:"44px 48px", boxShadow:"0 2px 24px rgba(28,25,23,0.04)", border:`1px solid ${T.border}` }}>
        <Field label="Client" hint={`${active.length} active`}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(175px, 1fr))", gap:10, marginTop:2 }}>
            {active.length === 0 && <div style={{ fontSize:13, color:T.muted, padding:"20px 0" }}>No active clients. Add one in Client Profiles.</div>}
            {active.map(c => (
              <button key={c.client_slug} onClick={() => setSlug(c.client_slug)} style={{
                padding:"14px 16px", borderRadius:10, textAlign:"left", cursor:"pointer",
                border:`2px solid ${slug === c.client_slug ? T.gold : T.border}`,
                background: slug === c.client_slug ? T.goldBg : T.s2,
                transition:"all 0.12s",
              }}>
                <div style={{ fontSize:13, fontWeight:500, color: slug === c.client_slug ? T.gold : T.text }}>{c.client_name}</div>
                <div style={{ fontSize:11, color:T.muted, marginTop:3 }}>{c.niche?.split(",")[0]?.trim() || "—"}</div>
              </button>
            ))}
          </div>
        </Field>
        <div style={{ height:1, background:T.borderL, margin:"24px 0" }} />
        <Field label="Topic override" hint="optional">
          {sel && <div style={{ fontSize:12, color:T.muted, marginBottom:8 }}>Default: {sel.default_topic || "Not set"}</div>}
          <input type="text" value={topic} onChange={e => setTopic(e.target.value)}
            placeholder={sel?.default_topic || "Leave empty to use client default"}
            style={{ ...inputStyle }} />
        </Field>
        <Btn variant="gold" full onClick={generate} disabled={!slug || status === "loading"} style={{ padding:"16px", fontSize:15, marginTop:8 }}>
          {status === "loading" ? "Generating... (~90 seconds)" : "Generate Script →"}
        </Btn>
        {status === "loading" && (
          <div style={{ marginTop:20, padding:"16px 20px", background:T.bg, borderRadius:10, fontSize:13, color:T.muted, lineHeight:1.6 }}>
            Running Hook → Problem → Content → CTAs → Sponsor → Outro. Grab a coffee.
          </div>
        )}
        {status === "success" && (
          <div style={{ marginTop:20, padding:"16px 20px", background:T.greenBg, borderRadius:10, border:"1px solid #C0DDD0" }}>
            <div style={{ fontSize:13, fontWeight:500, color:T.green, marginBottom: result?.doc_url ? 8 : 0 }}>✓ Script generated</div>
            {result?.doc_url && <a href={result.doc_url} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, fontWeight:500 }}>Open in Google Docs →</a>}
          </div>
        )}
        {status === "error" && (
          <div style={{ marginTop:20, padding:"16px 20px", background:"#FDF0F0", borderRadius:10, fontSize:13, color:T.red }}>
            Something went wrong. Check the n8n execution log.
          </div>
        )}
      </div>
    </div>
  );
}

// ── CLIENT MODAL ──────────────────────────────────────────────
function ClientModal({ client, onClose, onSave }) {
  const isNew = !client.id;
  const [f, setF] = useState({
    client_slug:         client.client_slug || "",
    client_name:         client.client_name || "",
    niche:               client.niche || "",
    tone_of_voice:       client.tone_of_voice || "",
    writing_style:       client.writing_style || "",
    target_audience:     client.target_audience || "",
    avoid_phrases_text:  (client.avoid_phrases || []).join("\n"),
    example_hooks_text:  (client.example_hooks || []).join("\n"),
    default_topic:       client.default_topic || "",
    sponsor_name:        client.sponsor_name || "",
    sponsor_brief:       client.sponsor_brief || "",
    cta_primary:         client.cta_primary || "",
    cta_secondary:       client.cta_secondary || "",
    script_length_min:   client.script_length_min || 1800,
    script_length_max:   client.script_length_max || 2400,
    active:              client.active !== undefined ? client.active : true,
  });
  const set = k => v => setF(p => ({ ...p, [k]:v }));

  function handleSave() {
    const { avoid_phrases_text, example_hooks_text, ...rest } = f;
    onSave({ ...rest, avoid_phrases: avoid_phrases_text.split("\n").filter(Boolean), example_hooks: example_hooks_text.split("\n").filter(Boolean) });
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(26,23,20,0.55)", display:"flex", alignItems:"flex-start", justifyContent:"flex-end", zIndex:200 }}>
      <div style={{ width:580, height:"100vh", background:T.surface, overflowY:"auto", padding:"44px 52px 60px", boxShadow:"-12px 0 60px rgba(28,25,23,0.12)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:36 }}>
          <div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:32, fontWeight:300, color:T.char }}>{isNew ? "New Client" : f.client_name}</div>
            {!isNew && <div style={{ fontSize:12, color:T.muted, marginTop:4 }}>{f.client_slug}</div>}
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:T.muted, padding:"4px 8px", lineHeight:1 }}>×</button>
        </div>

        <Divider label="Identity" />
        <Input label="Client Slug" value={f.client_slug} onChange={set("client_slug")} placeholder="tom-wheelwright" readOnly={!isNew} hint={isNew ? "Cannot change after saving" : undefined} />
        <Input label="Client Name" value={f.client_name} onChange={set("client_name")} placeholder="Tom Wheelwright" />
        <Input label="Niche" value={f.niche} onChange={set("niche")} placeholder="tax strategy, wealth building" />

        <Divider label="Voice & Style" />
        <TextArea label="Tone of Voice" value={f.tone_of_voice} onChange={set("tone_of_voice")} rows={5} placeholder="Describe how this person speaks..." />
        <TextArea label="Writing Style" value={f.writing_style} onChange={set("writing_style")} rows={4} placeholder="Sentence structure, rhythm, patterns..." />
        <TextArea label="Target Audience" value={f.target_audience} onChange={set("target_audience")} rows={3} />
        <TextArea label="Avoid Phrases" hint="one per line" value={f.avoid_phrases_text} onChange={set("avoid_phrases_text")} rows={4} placeholder={"game-changer\nlet's dive in\nin today's video"} />
        <TextArea label="Example Hooks" hint="one per line" value={f.example_hooks_text} onChange={set("example_hooks_text")} rows={5} placeholder="The IRS actually wrote a roadmap to paying zero in taxes..." />

        <Divider label="Content" />
        <Input label="Default Topic" value={f.default_topic} onChange={set("default_topic")} />
        <Input label="Sponsor Name" value={f.sponsor_name} onChange={set("sponsor_name")} />
        <TextArea label="Sponsor Brief" value={f.sponsor_brief} onChange={set("sponsor_brief")} rows={4} />
        <Input label="Primary CTA" value={f.cta_primary} onChange={set("cta_primary")} />
        <Input label="Secondary CTA" value={f.cta_secondary} onChange={set("cta_secondary")} />

        <Divider label="Settings" />
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          <Input label="Min Words" value={f.script_length_min} onChange={v => set("script_length_min")(Number(v))} type="number" />
          <Input label="Max Words" value={f.script_length_max} onChange={v => set("script_length_max")(Number(v))} type="number" />
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", border:`1px solid ${T.border}`, borderRadius:8, marginBottom:32, cursor:"pointer" }} onClick={() => set("active")(!f.active)}>
          <input type="checkbox" checked={f.active} onChange={e => set("active")(e.target.checked)} style={{ width:16, height:16, accentColor:T.gold, cursor:"pointer" }} onClick={e => e.stopPropagation()} />
          <div>
            <div style={{ fontSize:13, fontWeight:500, color:T.text }}>Active</div>
            <div style={{ fontSize:11, color:T.muted }}>Included in scheduled weekly runs</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:12 }}>
          <Btn variant="ghost" onClick={onClose} style={{ flex:1, padding:"12px" }}>Cancel</Btn>
          <Btn variant="gold" onClick={handleSave} style={{ flex:2, padding:"12px" }}>Save Client →</Btn>
        </div>
      </div>
    </div>
  );
}

// ── CLIENTS VIEW ──────────────────────────────────────────────
function ClientsView({ clients, onReload, db, toast }) {
  const [modal, setModal] = useState(null);
  const [delId, setDelId] = useState(null);

  async function saveClient(data) {
    try {
      if (data.id) {
        const { id, created_at, updated_at, ...rest } = data;
        await db.patch("client_profiles", id, rest);
      } else {
        await db.post("client_profiles", data);
      }
      setModal(null); onReload(); toast("Client saved", "success");
    } catch(e) { toast("Save failed: " + e.message, "error"); }
  }

  async function deleteClient(id) {
    try { await db.del("client_profiles", id); setDelId(null); onReload(); toast("Client deleted", "success"); }
    catch(e) { toast("Delete failed: " + e.message, "error"); }
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:300, color:T.char, lineHeight:1.05 }}>Client Profiles</div>
          <div style={{ fontSize:14, color:T.muted, marginTop:12 }}>{clients.length} total · {clients.filter(c => c.active).length} active</div>
        </div>
        <Btn variant="gold" onClick={() => setModal({})}>+ Add Client</Btn>
      </div>
      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Niche","Sponsor","Status",""].map((h,i) => (
                <th key={i} style={{ padding:"12px 20px", textAlign: i===4 ? "right" : "left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.06em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {clients.map((c,i) => (
              <tr key={c.id} style={{ borderBottom: i < clients.length-1 ? `1px solid ${T.borderL}` : "none" }}>
                <td style={{ padding:"16px 20px" }}>
                  <div style={{ fontSize:14, fontWeight:500, color:T.text }}>{c.client_name}</div>
                  <div style={{ fontSize:11, color:T.muted, marginTop:2 }}>{c.client_slug}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.muted, maxWidth:200 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.niche?.split(",").slice(0,2).join(", ") || "—"}</div>
                </td>
                <td style={{ padding:"16px 20px", fontSize:13, color:T.text }}>{c.sponsor_name || <span style={{ color:T.muted }}>—</span>}</td>
                <td style={{ padding:"16px 20px" }}><Badge color={c.active ? "green" : "neutral"}>{c.active ? "Active" : "Paused"}</Badge></td>
                <td style={{ padding:"16px 20px", textAlign:"right", whiteSpace:"nowrap" }}>
                  <Btn variant="link" onClick={() => setModal(c)} style={{ marginRight:20, fontSize:13 }}>Edit</Btn>
                  <Btn variant="link" onClick={() => setDelId(c.id)} style={{ color:T.muted, fontSize:13 }}>Delete</Btn>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {clients.length === 0 && <div style={{ padding:60, textAlign:"center", color:T.muted, fontSize:14 }}>No clients yet. Add your first client to get started.</div>}
      </div>
      {modal !== null && <ClientModal client={modal} onClose={() => setModal(null)} onSave={saveClient} />}
      {delId && (
        <div style={{ position:"fixed", inset:0, background:"rgba(26,23,20,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300 }}>
          <div style={{ background:T.surface, borderRadius:20, padding:"44px 52px", maxWidth:380, textAlign:"center", boxShadow:"0 8px 60px rgba(28,25,23,0.15)" }}>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, color:T.char, marginBottom:12 }}>Delete client?</div>
            <div style={{ fontSize:14, color:T.muted, marginBottom:32, lineHeight:1.6 }}>This permanently removes the profile. Script run history is kept.</div>
            <div style={{ display:"flex", gap:12 }}>
              <Btn variant="ghost" onClick={() => setDelId(null)} style={{ flex:1, padding:"12px" }}>Cancel</Btn>
              <Btn variant="danger" onClick={() => deleteClient(delId)} style={{ flex:1, padding:"12px" }}>Delete</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── HISTORY VIEW ──────────────────────────────────────────────
function HistoryView({ runs, onReload }) {
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:48 }}>
        <div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:300, color:T.char, lineHeight:1.05 }}>Script Runs</div>
          <div style={{ fontSize:14, color:T.muted, marginTop:12 }}>{runs.length} runs logged</div>
        </div>
        <Btn variant="ghost" onClick={onReload}>↻ Refresh</Btn>
      </div>
      <div style={{ background:T.surface, borderRadius:16, border:`1px solid ${T.border}`, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr style={{ background:T.bg }}>
              {["Client","Topic","Source","Date","Script"].map((h,i) => (
                <th key={i} style={{ padding:"12px 20px", textAlign:"left", fontSize:11, fontWeight:500, color:T.muted, letterSpacing:"0.06em", textTransform:"uppercase", borderBottom:`1px solid ${T.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {runs.map((r,i) => (
              <tr key={r.id} style={{ borderBottom: i < runs.length-1 ? `1px solid ${T.borderL}` : "none" }}>
                <td style={{ padding:"14px 20px", fontSize:14, fontWeight:500, color:T.text, whiteSpace:"nowrap" }}>{r.client_name}</td>
                <td style={{ padding:"14px 20px", fontSize:13, color:T.text, maxWidth:260 }}>
                  <div style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.topic || "—"}</div>
                </td>
                <td style={{ padding:"14px 20px" }}><Badge color={r.triggered_by === "webhook" ? "gold" : "neutral"}>{r.triggered_by || "—"}</Badge></td>
                <td style={{ padding:"14px 20px", fontSize:13, color:T.muted, whiteSpace:"nowrap" }}>
                  {r.created_at ? new Date(r.created_at).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" }) : "—"}
                </td>
                <td style={{ padding:"14px 20px" }}>
                  {r.doc_url ? <a href={r.doc_url} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, fontWeight:500, textDecoration:"none" }}>Open →</a> : <span style={{ fontSize:13, color:T.muted }}>—</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {runs.length === 0 && <div style={{ padding:60, textAlign:"center", color:T.muted, fontSize:14 }}>No runs yet. Generate your first script to see it here.</div>}
      </div>
    </div>
  );
}

// ── SETTINGS VIEW ─────────────────────────────────────────────
function SettingsView({ config, onUpdate, toast }) {
  const [f, setF] = useState(config);
  const set = k => v => setF(p => ({ ...p, [k]:v }));
  return (
    <div style={{ maxWidth:580 }}>
      <div style={{ marginBottom:48 }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:52, fontWeight:300, color:T.char, lineHeight:1.05 }}>Settings</div>
        <div style={{ fontSize:14, color:T.muted, marginTop:12 }}>Update your workspace connections.</div>
      </div>
      <div style={{ background:T.surface, borderRadius:20, padding:"40px 44px", border:`1px solid ${T.border}` }}>
        <Input label="Supabase Project URL" value={f.supabaseUrl} onChange={set("supabaseUrl")} />
        <Input label="Supabase Anon Key" value={f.supabaseKey} onChange={set("supabaseKey")} />
        <Input label="n8n Webhook URL" value={f.webhookUrl} onChange={set("webhookUrl")} />
        <Btn variant="gold" full onClick={() => { onUpdate(f); toast("Settings saved", "success"); }} style={{ padding:"14px", marginTop:8 }}>Save Settings →</Btn>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  const [configured, setConfigured] = useState(false);
  const [config, setConfig] = useState({ supabaseUrl:"", supabaseKey:"", webhookUrl:"" });
  const [view, setView] = useState("generate");
  const [clients, setClients] = useState([]);
  const [runs, setRuns] = useState([]);
  const [toastMsg, setToastMsg] = useState(null);

  const database = configured ? sb(config.supabaseUrl, config.supabaseKey) : null;

  useEffect(() => {
    if (!configured) return;
    loadClients();
    if (view === "history") loadRuns();
  }, [configured, view]);

  async function loadClients() {
    try { const d = await database.get("client_profiles", "?select=*&order=client_name.asc"); setClients(Array.isArray(d) ? d : []); } catch {}
  }
  async function loadRuns() {
    try { const d = await database.get("script_runs", "?select=*&order=created_at.desc&limit=50"); setRuns(Array.isArray(d) ? d : []); } catch {}
  }

  function showToast(message, type = "success") {
    setToastMsg({ message, type });
    setTimeout(() => setToastMsg(null), 3000);
  }

  if (!configured) return <SetupScreen onSave={cfg => { setConfig(cfg); setConfigured(true); }} />;

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:T.bg }}>
      <Sidebar view={view} setView={setView} clientCount={clients.length} />
      <main style={{ marginLeft:228, flex:1, padding:"64px 72px", minHeight:"100vh", boxSizing:"border-box" }}>
        {view === "generate" && <GenerateView clients={clients} config={config} />}
        {view === "clients"  && <ClientsView clients={clients} onReload={loadClients} db={database} toast={showToast} />}
        {view === "history"  && <HistoryView runs={runs} onReload={loadRuns} />}
        {view === "settings" && <SettingsView config={config} onUpdate={setConfig} toast={showToast} />}
      </main>
      {toastMsg && <Toast message={toastMsg.message} type={toastMsg.type} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
